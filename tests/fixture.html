<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Poe Notes fixture</title>
    <link rel="stylesheet" href="../content/page.css">
    <style>
      html, body { min-height: 100%; }
      body {
        margin: 0;
        color: #f2f3f5;
        background: #111214;
        font: 16px/1.62 Arial, sans-serif;
      }
      body[data-test-result="pass"]::before,
      body[data-test-result="fail"]::before {
        position: fixed;
        z-index: 2147483647;
        top: 12px;
        left: 50%;
        padding: 7px 10px;
        color: #fff;
        background: #18794e;
        border-radius: 4px;
        content: "PASS";
        font: 700 13px/1.2 Arial, sans-serif;
        transform: translateX(-50%);
      }
      body[data-test-result="fail"]::before {
        max-width: calc(100vw - 24px);
        background: #c93737;
        content: "FAIL: " attr(data-test-error);
      }
      .fixture-header {
        display: flex;
        min-height: 64px;
        align-items: center;
        justify-content: flex-end;
        padding: 0 20px;
        background: #1b1c20;
        border-bottom: 1px solid #303238;
      }
      .ChatPageNavbar_rightNavItemWrapper__fixture { display: flex; align-items: center; gap: 8px; }
      .fixture-native-button {
        display: grid;
        width: 32px;
        height: 32px;
        padding: 0;
        place-items: center;
        color: #f2f3f5;
        background: transparent;
        border: 0;
        border-radius: 6px;
      }
      .fixture-native-button .Button_label__fixture {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      }
      .page { width: min(760px, calc(100% - 40px)); margin: 36px auto 100px; }
      .bot { margin: 0 0 8px; color: #aab0b9; font-size: 13px; }
      .Message_selectableText__fixture { max-width: 660px; }
      p { margin: 0 0 16px; }
      .composer {
        position: fixed;
        right: 20px;
        bottom: 20px;
        left: 20px;
        max-width: 720px;
        margin: auto;
      }
      .GrowingTextArea_textArea__fixture {
        width: 100%;
        min-height: 52px;
        padding: 12px;
        color: #f2f3f5;
        background: #24262a;
        border: 1px solid #4c525c;
        border-radius: 7px;
      }
    </style>
    <script>
      (() => {
        const store = {};
        const storageListeners = [];
        const messageListeners = [];

        window.__fixtureStore = store;
        window.__fixtureSendMessage = (message) => new Promise((resolve, reject) => {
          const listener = messageListeners[0];
          if (!listener) {
            reject(new Error("No content message listener is installed"));
            return;
          }
          let responded = false;
          const sendResponse = (response) => {
            responded = true;
            resolve(response);
          };
          const asynchronous = listener(message, {}, sendResponse);
          if (asynchronous !== true && !responded) {
            resolve(undefined);
          }
        });
        window.chrome = {
          storage: {
            local: {
              get(keys, callback) {
                const result = {};
                for (const key of keys) {
                  if (Object.hasOwn(store, key)) result[key] = store[key];
                }
                callback(result);
              },
              set(values, callback) {
                const changes = {};
                for (const [key, value] of Object.entries(values)) {
                  changes[key] = { oldValue: store[key], newValue: value };
                  store[key] = structuredClone(value);
                }
                storageListeners.forEach((listener) => listener(changes, "local"));
                callback?.();
              }
            },
            onChanged: { addListener(listener) { storageListeners.push(listener); } }
          },
          runtime: {
            onMessage: { addListener(listener) { messageListeners.push(listener); } }
          }
        };
      })();
    </script>
  </head>
  <body>
    <header class="BaseNavbar_chatTitleNavbar__fixture fixture-header">
      <span class="ChatPageNavbar_rightNavItemWrapper__fixture">
        <button class="Button_root__fixture fixture-native-button" type="button">
          <span aria-hidden="true">+</span>
          <span class="Button_label__fixture">Invite</span>
        </button>
      </span>
    </header>
    <main class="page ChatMessagesScrollWrapper_scrollableContainerWrapper__fixture">
      <div class="InfiniteScroll_pagingTrigger__fixture"></div>
      <p class="bot">claude-sonnet</p>
      <article id="message-491375933718" data-complete="true">
        <div class="BotHeader_name__fixture">claude-sonnet</div>
        <div class="Message_selectableText__fixture">
          <p>The quick <strong>brown fox</strong> jumps over the quiet river.</p>
          <p>A second paragraph confirms that highlights survive structured replies.</p>
        </div>
      </article>
    </main>
    <footer class="composer ChatMessageInputContainer_inputContainer__fixture">
      <div class="GrowingTextArea_growWrap__fixture" data-replicated-value="Existing prompt">
        <textarea class="GrowingTextArea_textArea__fixture" rows="2">Existing prompt</textarea>
      </div>
    </footer>

    <script src="../vendor/turndown-7.2.4.js"></script>
    <script src="../vendor/turndown-plugin-gfm-1.0.2.js"></script>
    <script src="../vendor/jspdf-4.2.1.umd.min.js"></script>
    <script src="../content/anchor.js"></script>
    <script src="../content/export.js"></script>
    <script src="../content/pdf.js"></script>
    <script src="../content/content.js"></script>
    <script>
      const wait = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));

      const pagingTrigger = document.querySelector('.InfiniteScroll_pagingTrigger__fixture');
      window.__pagingAttempts = 0;
      pagingTrigger.scrollIntoView = () => {
        window.__pagingAttempts += 1;
        if (document.querySelector('#message-491375933700')) return;
        setTimeout(() => {
          if (document.querySelector('#message-491375933700')) return;
          const earlier = document.createElement('article');
          earlier.id = 'message-491375933700';
          earlier.dataset.complete = 'true';
          earlier.innerHTML = `
            <div class="ChatMessage_rightSideMessageWrapper__fixture">
              <div class="Message_selectableText__fixture"><p>An earlier question.</p></div>
            </div>
          `;
          document.querySelector('.page').prepend(earlier);
        }, 120);
      };

      document.addEventListener('click', (event) => {
        const download = event.target instanceof Element ? event.target.closest('a[download]') : null;
        if (!download) return;
        event.preventDefault();
        window.__fixtureDownload = fetch(download.href).then((response) => response.text());
        window.__fixtureFilename = download.download;
      }, true);

      function assert(value, message) {
        if (!value) throw new Error(message);
      }

      async function selectFixtureText() {
        await wait(250);
        const root = document.querySelector('.Message_selectableText__fixture');
        const firstText = root.querySelector('p').firstChild;
        const strongText = root.querySelector('strong').firstChild;
        const range = document.createRange();
        range.setStart(firstText, 4);
        range.setEnd(strongText, strongText.data.length);
        const selection = getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        root.dispatchEvent(new PointerEvent('pointerup', { bubbles: true, button: 0 }));
        await wait(120);
        return document.querySelector('#poe-notes-ui').shadowRoot;
      }

      async function run() {
        const searchParams = new URL(location.href).searchParams;
        const shadow = await selectFixtureText();
        const selectionMenu = shadow.querySelector('.selection-menu');
        const panel = shadow.querySelector('.panel');
        assert(!selectionMenu.hidden, 'selection actions did not open');
        assert(panel.hidden, 'highlight editor opened before choosing an action');

        if (!searchParams.has('bookmarksVisual') && (
          searchParams.has('visual') || innerWidth >= 900 || innerWidth <= 420
        )) {
          document.body.dataset.testResult = 'visual-ready';
          return;
        }

        if (!searchParams.has('bookmarksVisual') && !searchParams.has('skipQuote')) {
          const composer = document.querySelector('.GrowingTextArea_textArea__fixture');
          composer.setSelectionRange(8, 8);
          composer.dataset.inputEvents = '0';
          composer.addEventListener('input', () => {
            composer.dataset.inputEvents = String(Number(composer.dataset.inputEvents) + 1);
          });
          shadow.querySelector('.quote-action').click();
          await wait(150);

          const insertedQuote = '> quick brown fox\n\n';
          assert(composer.value === `${insertedQuote}Existing prompt`, 'quote did not preserve the existing draft');
          assert(
            composer.selectionStart === 8 + insertedQuote.length,
            `composer cursor was not preserved: expected ${8 + insertedQuote.length}, got ${composer.selectionStart}`
          );
          assert(composer.selectionEnd === composer.selectionStart, 'composer selection was not preserved');
          assert(composer.dataset.inputEvents === '1', 'quote did not dispatch an input event');
        }

        await selectFixtureText();
        assert(!selectionMenu.hidden, 'selection actions did not reopen');
        shadow.querySelector('.highlight-action').click();
        await wait(80);
        assert(!panel.hidden, 'editor did not open after choosing Highlight');
        assert(shadow.querySelector('.quote').textContent === 'quick brown fox', 'selected quote is wrong');

        shadow.querySelector('.note').value = 'Useful evidence';
        shadow.querySelector('[data-color="blue"]').click();
        shadow.querySelector('.save').click();
        await wait(450);

        let marks = document.querySelectorAll('[data-poe-notes-id]');
        assert(marks.length === 2, 'multi-node selection was not fully highlighted');
        assert([...marks].every((mark) => mark.dataset.poeNotesHighlight === 'blue'), 'color was not saved');

        const headerActions = document.querySelector('.ChatPageNavbar_rightNavItemWrapper__fixture');
        const bookmarkButton = headerActions.querySelector('[data-poe-notes-native-bookmarks]');
        const exportButton = headerActions.querySelector('[data-poe-notes-native-export]');
        assert(bookmarkButton, 'bookmark button was not installed');
        assert(exportButton, 'export button was not installed');
        assert(headerActions.children[0] === bookmarkButton, 'bookmark button is not first');
        assert(headerActions.children[1] === exportButton, 'bookmark button is not left of download');

        bookmarkButton.click();
        await wait(120);
        const bookmarksPopover = shadow.querySelector('.bookmarks-popover');
        let bookmarkItems = shadow.querySelectorAll('.bookmark-item');
        assert(!bookmarksPopover.hidden, 'bookmark popover did not open');
        assert(bookmarkItems.length === 1, 'saved highlight is missing from bookmark popover');
        assert(bookmarkItems[0].querySelector('.bookmark-quote').textContent === 'quick brown fox', 'bookmark quote preview is wrong');
        assert(bookmarkItems[0].querySelector('.bookmark-note').textContent === 'Useful evidence', 'bookmark note preview is wrong');
        assert(
          bookmarkItems[0].querySelector('.bookmark-note').nextElementSibling?.classList.contains('bookmark-quote'),
          'bookmark note is not displayed before the quote preview'
        );
        assert(
          getComputedStyle(bookmarkItems[0].querySelector('.bookmark-note')).webkitLineClamp === '1',
          'bookmark note is not limited to one title line'
        );
        assert(
          getComputedStyle(bookmarkItems[0].querySelector('.bookmark-quote')).webkitLineClamp === '2',
          'bookmark content with a note is not limited to two lines'
        );

        if (searchParams.has('bookmarksVisual')) {
          const visualPageKey = Object.keys(window.__fixtureStore).find((key) => key.startsWith('poe-notes:page:'));
          const noteLessAnnotation = {
            id: 'visual-highlight-without-note',
            messageId: 'message-visual-only',
            start: 0,
            end: 118,
            quote: 'A highlight without a note uses the full three-line preview so enough surrounding context remains visible in the bookmark list.',
            prefix: '',
            suffix: '',
            color: 'pink',
            note: '',
            createdAt: '2026-07-20T00:01:00.000Z',
            updatedAt: '2026-07-20T00:01:00.000Z'
          };
          await new Promise((resolve) => chrome.storage.local.set({
            [visualPageKey]: [...window.__fixtureStore[visualPageKey], noteLessAnnotation]
          }, resolve));
          await wait(120);
          bookmarkItems = shadow.querySelectorAll('.bookmark-item');
          const noteLessItem = [...bookmarkItems].find((item) => !item.querySelector('.bookmark-note'));
          assert(bookmarkItems.length === 2, 'note-less bookmark is missing from visual fixture');
          assert(noteLessItem, 'note-less bookmark unexpectedly renders a title');
          assert(
            getComputedStyle(noteLessItem.querySelector('.bookmark-quote')).webkitLineClamp === '3',
            'bookmark content without a note is not limited to three lines'
          );
          document.body.dataset.testResult = 'visual-ready';
          return;
        }

        bookmarkItems[0].click();
        await wait(180);
        marks = document.querySelectorAll('[data-poe-notes-id]');
        assert(bookmarksPopover.hidden, 'bookmark popover stayed open after a jump');
        assert([...marks].every((mark) => mark.hasAttribute('data-poe-notes-jump-target')), 'jump feedback is missing');

        const textRoot = document.querySelector('.Message_selectableText__fixture');
        textRoot.innerHTML = '<p>The quick <strong>brown fox</strong> jumps over the quiet river.</p><p>A second paragraph confirms that highlights survive structured replies.</p>';
        await wait(450);
        marks = document.querySelectorAll('[data-poe-notes-id]');
        assert(marks.length === 2, 'highlight was not restored after a DOM rerender');

        marks[0].click();
        await wait(80);
        assert(!panel.hidden, 'saved highlight did not reopen');
        assert(shadow.querySelector('.note').value === 'Useful evidence', 'saved note was not restored');
        assert(!shadow.querySelector('.delete').hidden, 'delete action is missing while editing');
        shadow.querySelector('.delete').click();
        await wait(300);

        assert(document.querySelectorAll('[data-poe-notes-id]').length === 0, 'delete did not remove marks');
        const pageKey = Object.keys(window.__fixtureStore).find((key) => key.startsWith('poe-notes:page:'));
        assert(pageKey && window.__fixtureStore[pageKey].length === 0, 'delete was not persisted');

        const earlierAnnotation = {
          id: 'earlier-highlight',
          messageId: 'message-491375933700',
          start: 3,
          end: 19,
          quote: 'earlier question',
          prefix: 'An ',
          suffix: '.',
          color: 'green',
          note: 'Loaded on demand',
          createdAt: '2026-07-20T00:00:00.000Z',
          updatedAt: '2026-07-20T00:00:00.000Z'
        };
        await new Promise((resolve) => chrome.storage.local.set({ [pageKey]: [earlierAnnotation] }, resolve));
        await wait(160);
        bookmarkButton.click();
        await wait(100);
        bookmarkItems = shadow.querySelectorAll('.bookmark-item');
        assert(bookmarkItems.length === 1, 'on-demand bookmark is missing');
        bookmarkItems[0].click();
        await wait(650);

        const earlierMessage = document.querySelector('#message-491375933700');
        const earlierMark = earlierMessage?.querySelector('[data-poe-notes-id="earlier-highlight"]');
        assert(window.__pagingAttempts >= 1, 'bookmark jump did not request earlier messages');
        assert(earlierMessage, 'bookmark jump did not load the target message');
        assert(earlierMark, 'bookmark jump did not restore the target highlight');
        assert(earlierMark.hasAttribute('data-poe-notes-jump-target'), 'on-demand jump feedback is missing');

        const exportResult = await window.__fixtureSendMessage({ type: 'POE_NOTES_EXPORT_CONVERSATION' });
        const exportedMarkdown = await window.__fixtureDownload;
        assert(exportResult?.ok, `export failed: ${exportResult?.error || 'unknown error'}`);
        assert(exportResult.count === 2, 'export did not collect the asynchronously loaded message');
        assert(window.__pagingAttempts >= 4, 'export stopped before history became stable');
        assert(window.__fixtureFilename === 'Poe Notes fixture.md', 'export filename is wrong');
        assert(exportedMarkdown.includes('## You\n\nAn earlier question.'), 'earlier user message is missing');
        assert(exportedMarkdown.includes('## claude-sonnet'), 'assistant author is missing');
        assert(
          exportedMarkdown.indexOf('An earlier question.') < exportedMarkdown.indexOf('A second paragraph'),
          'exported messages are not chronological'
        );
        document.body.dataset.testResult = 'pass';
        document.title = 'PASS - Poe Notes fixture';
      }

      run().catch((error) => {
        document.body.dataset.testResult = 'fail';
        document.body.dataset.testError = error.message;
        document.title = `FAIL - ${error.message}`;
      });
    </script>
  </body>
</html>
